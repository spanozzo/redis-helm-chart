apiVersion: v1
kind: Service
metadata:
  name: {{ include "redis.serviceName" . }}
  labels:
    {{- include "redis.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: sentinel
      port: {{ .Values.sentinel.port }}
      targetPort: sentinel
    - name: redis
      port: {{ .Values.service.port }}
      targetPort: redis
  selector:
    {{- include "redis.selectorLabels" . | nindent 4 }}
