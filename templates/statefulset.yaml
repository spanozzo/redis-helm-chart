apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "redis.nodeName" . }}
  labels:
    {{- include "redis.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "redis.headlessName" . }}
  replicas: {{ .Values.replicaCount }}
  podManagementPolicy: Parallel
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      {{- include "redis.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "redis.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              {{- include "redis.selectorLabels" . | nindent 14 }}
        {{- with .Values.topologySpreadConstraints }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: init
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              echo "init: copying static redis.conf to /data/redis.conf"
              cp /config/redis.conf /data/redis.conf
              chmod 0644 /data/redis.conf
              echo "init: copying static sentinel.conf to /sentinel/sentinel.conf"
              cp /config/sentinel.conf /sentinel/sentinel.conf
              chmod 0644 /sentinel/sentinel.conf
          volumeMounts:
            - name: config
              mountPath: /config
            - name: data
              mountPath: /data
            - name: sentinel-data
              mountPath: /sentinel
          resources:
            {{- toYaml .Values.resources.init | nindent 12 }}
      containers:
        - name: redis
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          command:
            - /bin/sh
            - /scripts/redis-start.sh
          env:
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            {{- if .Values.auth.enabled }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "redis.secretName" . }}
                  key: {{ include "redis.secretPasswordKey" . }}
            {{- end }}
          ports:
            - name: redis
              containerPort: {{ .Values.service.port }}
          lifecycle:
            preStop:
              exec:
                {{- /*
                >/proc/1/fd/1 2>/proc/1/fd/2 otherwise exec hook logs aren't redirected to container logs
                */}}
                command:
                  - /bin/sh
                  - -c
                  - /scripts/redis-prestop.sh >/proc/1/fd/1 2>/proc/1/fd/2
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - |
                  {{- if .Values.auth.enabled }}
                  redis-cli --no-auth-warning -a "${REDIS_PASSWORD}" -p {{ .Values.service.port }} ping | grep -q PONG
                  {{- else }}
                  redis-cli -p {{ .Values.service.port }} ping | grep -q PONG
                  {{- end }}
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - |
                  {{- if .Values.auth.enabled }}
                  redis-cli --no-auth-warning -a "${REDIS_PASSWORD}" -p {{ .Values.service.port }} ping | grep -q PONG
                  {{- else }}
                  redis-cli -p {{ .Values.service.port }} ping | grep -q PONG
                  {{- end }}
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          volumeMounts:
            - name: config
              mountPath: /config
            - name: scripts
              mountPath: /scripts
            - name: data
              mountPath: /data
          resources:
            {{- toYaml .Values.resources.redis | nindent 12 }}
        - name: sentinel
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          command:
            - /bin/sh
            - /scripts/sentinel-start.sh
          env:
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            {{- if .Values.auth.enabled }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "redis.secretName" . }}
                  key: {{ include "redis.secretPasswordKey" . }}
            {{- end }}
          ports:
            - name: sentinel
              containerPort: {{ .Values.sentinel.port }}
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - /scripts/sentinel-prestop.sh >/proc/1/fd/1 2>/proc/1/fd/2
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - |
                  {{- if .Values.auth.enabled }}
                  redis-cli --no-auth-warning -a "${REDIS_PASSWORD}" -p {{ .Values.sentinel.port }} ping | grep -q PONG
                  {{- else }}
                  redis-cli -p {{ .Values.sentinel.port }} ping | grep -q PONG
                  {{- end }}
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - |
                  {{- if .Values.auth.enabled }}
                  redis-cli --no-auth-warning -a "${REDIS_PASSWORD}" -p {{ .Values.sentinel.port }} ping | grep -q PONG
                  {{- else }}
                  redis-cli -p {{ .Values.sentinel.port }} ping | grep -q PONG
                  {{- end }}
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          volumeMounts:
            - name: config
              mountPath: /config
            - name: scripts
              mountPath: /scripts
            - name: sentinel-data
              mountPath: /sentinel
          resources:
            {{- toYaml .Values.resources.sentinel | nindent 12 }}
        {{- if .Values.metrics.enabled }}
        - name: metrics
          image: "{{ .Values.metrics.image.repository }}:{{ .Values.metrics.image.tag }}"
          imagePullPolicy: {{ .Values.metrics.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          env:
            - name: REDIS_ADDR
              value: "redis://localhost:{{ .Values.service.port }}"
            {{- if .Values.auth.enabled }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "redis.secretName" . }}
                  key: {{ include "redis.secretPasswordKey" . }}
            {{- end }}
            {{- with .Values.metrics.extraEnvVars }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
          livenessProbe:
            httpGet:
              path: /health
              port: metrics
          readinessProbe:
            httpGet:
              path: /health
              port: metrics
          resources:
            {{- toYaml .Values.resources.metrics | nindent 12 }}
        {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "redis.configConfigMapName" . }}
        - name: scripts
          configMap:
            name: {{ include "redis.scriptsConfigMapName" . }}
            defaultMode: 0755
        - name: sentinel-data
          emptyDir: {}
        {{- if not .Values.persistence.enabled }}
        - name: data
          emptyDir: {}
        {{- end }}
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "redis.labels" . | nindent 10 }}
      spec:
        accessModes:
          {{- toYaml .Values.persistence.accessModes | nindent 10 }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
        {{- with .Values.persistence.storageClass }}
        storageClassName: {{ . }}
        {{- end }}
  {{- end }}
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Delete
    whenScaled: Retain
